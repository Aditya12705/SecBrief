version: v1

identity:
  api_key: $ARMORIQ_API_KEY
  user_id: secbrief-user
  agent_id: secbrief-agent

environment: sandbox

proxy:
  url: https://customer-proxy.armoriq.ai
  timeout: 30
  max_retries: 3

mcp_servers:
  - id: secbrief-mcp
    url: https://customer-proxy.armoriq.ai
    description: SecBrief remediation tools
    auth: none

policy:
  allow:
    - secbrief-mcp/*
  deny:
    - secbrief-mcp/delete_*
    - secbrief-mcp/exfiltrate_*
    - secbrief-mcp/drop_*
    - secbrief-mcp/disable_*
    - secbrief-mcp/export_all_*

intent:
  ttl_seconds: 3600
  require_csrg: true
